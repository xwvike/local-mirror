# 推送 v* tag 时自动发行（配置见 .goreleaser.yaml，方案见 docs/RELEASE.md）。
# TAP_GITHUB_TOKEN：fine-grained PAT，需对 xwvike/homebrew-tap 与
# xwvike/scoop-bucket 两个仓库有 Contents 写权限（Actions 自带的
# GITHUB_TOKEN 只对本仓库有效，推不了别的仓库）。
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changelog 与 git describe 需要完整历史

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
