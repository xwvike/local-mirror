# 发行配置：git tag（v*）触发 CI 跑 `goreleaser release`，一份配置产出
# GitHub Releases 压缩包 + checksums（唯一事实源）、Linux deb/rpm、
# macOS Homebrew cask（推到 homebrew-tap）、Windows Scoop manifest
# （推到 scoop-bucket）。
# 本地验证：goreleaser check && goreleaser release --snapshot --clean
version: 2

project_name: local-mirror

builds:
  - main: ./cmd/local-mirror
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - README.zh-CN.md
      - deploy/local-mirror.service
      - deploy/local-mirror.example.yml
      - deploy/com.xwvike.local-mirror.plist

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^ci"

nfpms:
  - package_name: local-mirror
    vendor: XWVIKE
    homepage: https://github.com/xwvike/local-mirror
    maintainer: XWVIKE <xwvike@gmail.com>
    description: One-way directory mirroring over TCP with relays, LAN discovery and optional Noise encryption.
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    contents:
      # systemd unit 作为示例文档而非直接落 /lib/systemd/system：
      # 示例里的 ExecStart 指向占位目录（/srv/data），必须编辑后才能用，
      # 且路径写的是 /usr/local/bin（手工安装场景），与包管理器的 /usr/bin
      # 不一致——用户复制示例到 /etc/systemd/system 时自行改掉这两处
      - src: deploy/local-mirror.service
        dst: /usr/share/doc/local-mirror/examples/local-mirror.service
      - src: deploy/local-mirror.example.yml
        dst: /usr/share/doc/local-mirror/examples/local-mirror.example.yml

homebrew_casks:
  - name: local-mirror
    # auto：预发行/快照不推 cask，稳定版用户 brew upgrade 不会被拽到 RC
    skip_upload: "auto"
    repository:
      owner: xwvike
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/xwvike/local-mirror
    description: One-way directory mirroring over TCP with relays, LAN discovery and optional Noise encryption
    license: MIT
    # 未签名二进制：cask 安装后去掉 quarantine 标记，否则 Gatekeeper 拦截
    # （CLI 不做 Apple 签名/公证）
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/local-mirror"]
          end

scoops:
  - name: local-mirror
    # auto：预发行/快照不推 scoop manifest，稳定版用户不会被拽到 RC
    skip_upload: "auto"
    repository:
      owner: xwvike
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/xwvike/local-mirror
    description: One-way directory mirroring over TCP with relays, LAN discovery and optional Noise encryption
    license: MIT

release:
  draft: false
  # 预发行 tag（含 -rc / -beta 等语义化预发行段）在 GitHub 上标记为 Pre-release，
  # 不覆盖 latest；正式 tag 才是正式发行
  prerelease: auto
